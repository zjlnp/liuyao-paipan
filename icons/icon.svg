<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="yangG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="url(#gold)" stroke-width="6"/>

  <!-- 地天泰 ䷊: 下乾上坤 = 下三阳 上三阴 -->
  <!-- 初爻 bottom - yang -->
  <rect x="90" y="380" width="332" height="26" rx="13" fill="url(#yangG)" filter="url(#glow)"/>
  <!-- 二爻 - yang -->
  <rect x="90" y="320" width="332" height="26" rx="13" fill="url(#yangG)" filter="url(#glow)"/>
  <!-- 三爻 - yang -->
  <rect x="90" y="260" width="332" height="26" rx="13" fill="url(#yangG)" filter="url(#glow)"/>
  <!-- 四爻 - yin -->
  <rect x="90" y="200" width="138" height="26" rx="13" fill="url(#yangG)"/>
  <rect x="284" y="200" width="138" height="26" rx="13" fill="url(#yangG)"/>
  <!-- 五爻 - yin -->
  <rect x="90" y="140" width="138" height="26" rx="13" fill="url(#yangG)"/>
  <rect x="284" y="140" width="138" height="26" rx="13" fill="url(#yangG)"/>
  <!-- 上爻 top - yin -->
  <rect x="90" y="80" width="138" height="26" rx="13" fill="url(#yangG)"/>
  <rect x="284" y="80" width="138" height="26" rx="13" fill="url(#yangG)"/>
</svg>
